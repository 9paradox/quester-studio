name: Bug report
description: Report a defect in Quester Studio
title: "[bug]: "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting. Search [existing issues](https://github.com/9paradox/quester-studio/issues) first.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. bun run ...
        2. ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - schema
        - nodes
        - engine
        - cli
        - desktop
        - docs
        - infra
        - unknown
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or git SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Bun version, etc.
